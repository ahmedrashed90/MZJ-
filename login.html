<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول | نظام التسويق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card" aria-label="تسجيل الدخول">
      <aside class="login-art">
        <div>
          <img src="assets/img/logo.png" alt="MZJ Logo">
          <h2>نظام التسويق</h2>
          <p>إدارة الحملات، المحتوى، التقويم الشهري، والمهام من مكان واحد.</p>
        </div>
      </aside>

      <section class="login-form">
        <h1>تسجيل الدخول</h1>
        <p style="color:var(--muted)">أدخل بيانات حسابك للمتابعة.</p>

        <form id="loginForm" class="form" style="margin-top:24px">
          <div class="field">
            <label for="loginEmail">البريد الإلكتروني</label>
            <input id="loginEmail" name="email" type="email" autocomplete="email" required>
          </div>

          <div class="field">
            <label for="loginPassword">كلمة المرور</label>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
          </div>

          <button class="btn btn-primary" type="submit" style="justify-content:center">تسجيل الدخول</button>
          <p id="loginMessage" class="empty-state" aria-live="polite" style="padding:0;margin:0;text-align:right"></p>
        </form>
      </section>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="routes.js"></script>
  <script src="auth.js"></script>
</body>
</html>
