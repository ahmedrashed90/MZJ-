<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | نظام التسويق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand-panel" aria-label="هوية النظام">
      <div class="brand-mark">
        <img src="assets/brand-logo.png" alt="محمد بن دغار العجمي" />
      </div>
      <div class="brand-copy">
        <span class="eyebrow">نظام التسويق</span>
        <h1>إدارة حملاتك ومهام المحتوى من مكان واحد</h1>
        <p>منصة داخلية لتنظيم الحملات، التقويم الشهري، المهام، والتقارير.</p>
      </div>
    </section>

    <section class="auth-card" aria-label="تسجيل الدخول">
      <div class="auth-card-header">
        <span class="eyebrow">مرحباً بك</span>
        <h2>تسجيل الدخول</h2>
        <p>استخدم بيانات حسابك للدخول إلى النظام.</p>
      </div>

      <form id="loginForm" class="auth-form" autocomplete="on">
        <label class="form-field" for="loginEmail">
          <span>البريد الإلكتروني</span>
          <input id="loginEmail" name="email" type="email" autocomplete="email" required />
        </label>

        <label class="form-field" for="loginPassword">
          <span>كلمة المرور</span>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button class="btn btn-primary" type="submit">تسجيل الدخول</button>
        <p id="loginMessage" class="form-message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="routes.js"></script>
  <script src="auth.js"></script>
</body>
</html>
